name: Keepalive

# Evita che l'inattivita' prolungata metta in pausa il progetto.
#  1) Supabase (free): si mette in pausa dopo ~7 giorni senza richieste ->
#     pinghiamo la REST API (chiave anon, gia' pubblica nel frontend).
#  2) GitHub Actions: i workflow schedulati vengono disabilitati dopo 60
#     giorni senza attivita' sul repo -> aggiorniamo un timestamp sul branch
#     separato "keepalive" (non ricostruisce Pages: niente badge di update).
on:
  schedule:
    - cron: '23 5 */2 * *'   # ogni 2 giorni, 05:23 UTC
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (REST) per evitare la pausa da inattivita'
        run: |
          REF=wwnmayddwsdtjxowwxge
          ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3bm1heWRkd3NkdGp4b3d3eGdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTI4OTYsImV4cCI6MjA5NzM2ODg5Nn0.VXy-2Hc8iY0UXXHxphzlRCYZGFDbSvknW8DFhuxL2oY"
          code=$(curl -s -o /dev/null -w "%{http_code}" "https://$REF.supabase.co/rest/v1/app_version?select=id&limit=1" -H "apikey: $ANON" -H "Authorization: Bearer $ANON")
          echo "Supabase REST -> HTTP $code"
          if [ "$code" != "200" ] && [ "$code" != "206" ]; then echo "::warning::Supabase ha risposto $code"; fi

      - name: Timestamp sul branch keepalive (tiene attivo il repo)
        env:
          GH: ${{ secrets.KEEPALIVE_PAT }}
        run: |
          OWNER=palombaraguardiamedica-prog; REPO=turni-palombara; BR=keepalive; FILE=last-ping.txt
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CONTENT=$(printf "%s\n" "$TS" | base64 -w0)
          SHA=$(curl -s -H "Authorization: Bearer $GH" "https://api.github.com/repos/$OWNER/$REPO/contents/$FILE?ref=$BR" | grep -oE '"sha": ?"[0-9a-f]{40}"' | head -1 | cut -d'"' -f4)
          curl -s -X PUT -H "Authorization: Bearer $GH" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$OWNER/$REPO/contents/$FILE" \
            -d "{\"message\":\"keepalive $TS\",\"content\":\"$CONTENT\",\"branch\":\"$BR\",\"sha\":\"$SHA\"}" \
            -o /dev/null -w "GitHub contents PUT -> %{http_code}\n"
